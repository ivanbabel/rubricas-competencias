<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Autoevaluación de Competencias Básicas</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <script defer src="scripts/scorm.global.js"></script>
  <script defer src="scripts/scorm12_api.js"></script>
  <script defer src="scripts/jspdf.global.js"></script>
  <script defer src="scripts/app.js"></script>
</head>
<body>
  <a class="skip-link" href="#contenido">Saltar al contenido principal</a>

  <header class="site-header">
    <img class="site-logo" src="media/Logo-JuntaAndalucia.jpg" alt="Junta de Andalucía"/>
    <div class="site-heading">
      <p class="kicker" id="rb-competency"></p>
      <h1 id="rb-title">Autoevaluación de Competencias Básicas</h1>
      <p class="rol"><span class="visually-hidden">Rol evaluado: </span><span id="rb-rol"></span></p>
    </div>
  </header>
  <hr class="header-rule"/>

  <main class="container" id="contenido">
    <section class="intro" aria-labelledby="intro-h">
      <h2 id="intro-h" class="visually-hidden">Instrucciones</h2>
      <p id="rb-definition" class="definition"></p>
      <p id="rb-instructions" class="muted"></p>
      <div class="legend">
        <p class="legend-title">Escala de valoración</p>
        <ul class="legend-list" id="rb-legend"></ul>
      </div>
    </section>

    <!-- Barra de progreso (la construye app.js) -->
    <nav class="stepper" id="stepper" aria-label="Progreso de la autoevaluación"></nav>

    <!-- Anuncio de cambio de paso para lectores de pantalla -->
    <p class="visually-hidden" id="wizard-status" aria-live="polite"></p>

    <!-- Pasos del asistente (los construye app.js) -->
    <form id="wizard" novalidate>
      <div id="steps"></div>
    </form>

    <div id="err" class="alert" role="alert" hidden></div>
  </main>
</body>
</html>
